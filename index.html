<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Beau+Rivage&family=Bonheur+Royale&family=MonteCarlo&family=Rouge+Script&display=swap" rel="stylesheet">
</head>

<body>
    <div class="player-wrapper">
        <div class=" player">
            <div class="cd-wrapper">
                <img src="cover.jpg" class="cd">

            </div>
            <h3 id="title"> Song title</h3>
            <p id="artist">Artist Name </p>
            <audio id="audio"></audio>

            <div class="controls">
                <button id="prev">⏮</button>
                <button id="play">⏸</button>
                <button id="next">⏭</button>
                <div class="volume" style="display: none;">
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                </div>
                <button id="volBtn">🔊</button>
            </div>
        </div>
        <div class="progress">
            <input type="range" id="progress" value="0" min="0" max="100">

        </div>
        <div class="volume" style="display: none;">
            <i class="vol-icon">🔊</i>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
